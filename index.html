<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkPlex - Earn From Home</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/logo/workplex-icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo/apple-touch-icon.png" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="WorkPlex - Earn From Home" />
    <meta property="og:description" content="Empowering India's gig workforce with transparent, compliant, and highly rewarding digital opportunities." />
    <meta property="og:image" content="https://workplex.hvrs.in/assets/logo/workplex-og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="WorkPlex - Earn From Home" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Shield fetch silently to prevent polyfills from crashing when fetch is read-only
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get() { return originalFetch; },
              set(v) { /* silently ignore overwrite attempts */ },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Global haptic feedback
      document.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (btn && navigator.vibrate) {
          navigator.vibrate(10);
        }
      });
    </script>
  </body>
</html>
