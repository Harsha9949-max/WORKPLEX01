<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Shield fetch silently to prevent polyfills from crashing when fetch is read-only
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get() { return originalFetch; },
              set(v) { /* silently ignore overwrite attempts */ },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Global haptic feedback
      document.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (btn && navigator.vibrate) {
          navigator.vibrate(10);
        }
      });
    </script>
  </body>
</html>
