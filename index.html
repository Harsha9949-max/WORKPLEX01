<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Shield against some libraries trying to overwrite fetch in read-only environments
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get() { return originalFetch; },
              set(v) { 
                console.warn('Blocked attempt to overwrite fetch. If you intended to mock fetch, use a different strategy.'); 
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Fallback or ignore if defineProperty fails
          console.error('Failed to protect fetch property:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Global haptic feedback
      document.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (btn && navigator.vibrate) {
          navigator.vibrate(10);
        }
      });
    </script>
  </body>
</html>
